<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Бот — просмотр</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: #eee; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
    #header { background: #16213e; padding: 8px 12px; display: flex; align-items: center; gap-10 gap: 8px; flex-wrap: wrap; border-bottom: 1px solid #0f3460; flex-shrink: 0; }
    #header { gap: 8px; }
    #title { font-size: 14px; font-weight: 600; white-space: nowrap; }
    #vnc-status { font-size: 12px; padding: 3px 10px; border-radius: 4px; background: #0f3460; white-space: nowrap; }
    #vnc-status.connected { background: #1a5c2a; }
    #vnc-status.waiting { background: #5c4a0a; }
    #vnc-status.error { background: #5c1a1a; }
    #bot-status { font-size: 12px; padding: 3px 8px; border-radius: 4px; background: #1a3a1a; color: #6ee66e; white-space: nowrap; }
    #bot-status.stopped { background: #2a2a2a; color: #888; }
    select, .btn {
      font-size: 12px; border: none; border-radius: 4px; cursor: pointer;
      padding: 4px 8px; outline: none;
    }
    select { background: #0f3460; color: #eee; }
    .btn { color: #fff; font-weight: 500; }
    .btn-start { background: #1a6b2a; }
    .btn-start:hover { background: #1e8034; }
    .btn-start:disabled { background: #1a4a22; color: #888; cursor: default; }
    .btn-stop  { background: #7a1a1a; }
    .btn-stop:hover { background: #9a2222; }
    .btn-stop:disabled  { background: #4a1818; color: #888; cursor: default; }
    .btn-close { background: #333; }
    .btn-close:hover { background: #555; }
    #spacer { flex: 1; }
    #screen-wrap { flex: 1; overflow: hidden; display: flex; align-items: center; justify-content: center; position: relative; }
    #overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.65); font-size: 16px; color: #ccc; gap: 12px; display: none; }
    #overlay.show { display: flex; }
    #overlay-text { text-align: center; }
    #overlay-start-hint { font-size: 13px; color: #aaa; }
  </style>
</head>
<body>
  <div id="header">
    <span id="title">👁 Бот #<span id="botNum">…</span></span>
    <span id="vnc-status" class="waiting">⏳ Подключение…</span>
    <span id="bot-status" class="stopped">⬤ Остановлен</span>
    <select id="sel-mode">
      <option value="warmup">Warmup</option>
      <option value="target">Target</option>
    </select>
    <select id="sel-site">
      <option value="https://kadastrmap.info">kadastrmap.info</option>
      <option value="https://shared-brains.ru">shared-brains.ru</option>
      <option value="https://brain-skill.ru">brain-skill.ru</option>
      <option value="https://edu.shared-brains.ru">edu.shared-brains.ru</option>
      <option value="https://мцск.рф">мцск.рф</option>
    </select>
    <button class="btn btn-start" id="btn-start">▶ Запустить</button>
    <button class="btn btn-stop"  id="btn-stop" disabled>■ Стоп</button>
    <span id="spacer"></span>
    <button class="btn btn-close" onclick="window.close()">✕</button>
  </div>
  <div id="screen-wrap">
    <div id="overlay" class="show">
      <div id="overlay-text">⏳ Ожидание запуска браузера…</div>
      <div id="overlay-start-hint">Нажми ▶ Запустить чтобы начать прогрев</div>
    </div>
  </div>

  <script type="module">
    import RFB from '/novnc/core/rfb.js';

    const params  = new URLSearchParams(location.search);
    const botIdN  = parseInt(params.get('bot')) || 1;
    document.getElementById('botNum').textContent = String(botIdN).padStart(3, '0');

    const proto   = location.protocol === 'https:' ? 'wss' : 'ws';
    const wsUrl   = `${proto}://${location.host}/vnc-ws`;

    const vncStatus  = document.getElementById('vnc-status');
    const botStatus  = document.getElementById('bot-status');
    const overlay    = document.getElementById('overlay');
    const overlayTxt = document.getElementById('overlay-text');
    const hint       = document.getElementById('overlay-start-hint');
    const wrap       = document.getElementById('screen-wrap');
    const btnStart   = document.getElementById('btn-start');
    const btnStop    = document.getElementById('btn-stop');
    const selMode    = document.getElementById('sel-mode');
    const selSite    = document.getElementById('sel-site');

    let rfb          = null;
    let retryTimer   = null;
    let wasConnected = false;
    let botRunning   = false;

    // ─── API helpers ───────────────────────────────────────────
    async function api(procedure, input) {
      try {
        const r = await fetch(`/api/trpc/${procedure}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify(input ?? {}),
        });
        if (r.status === 401) return { __status: 401 };
        if (!r.ok) return { __status: r.status };
        const d = await r.json();
        return d?.result?.data ?? null;
      } catch { return null; }
    }

    async function checkBotStatus() {
      try {
        const r = await fetch('/api/trpc/list?batch=1&input=%7B%7D', {
          credentials: 'include',
        });
        if (!r.ok) return;
        const d = await r.json();
        const data = d?.[0]?.result?.data;
        if (!data) return;
        const bot = data.bots?.find(b => b.botId === botIdN);
        setBotRunning(bot?.status === 'running', bot?.mode, bot?.website);
      } catch {}
    }

    function setBotRunning(running, mode, site) {
      botRunning = running;
      if (running) {
        botStatus.textContent = `⬤ Работает (${mode ?? ''})`;
        botStatus.className = '';
        btnStart.disabled = true;
        btnStop.disabled  = false;
        hint.style.display = 'none';
      } else {
        botStatus.textContent = '⬤ Остановлен';
        botStatus.className = 'stopped';
        btnStart.disabled = false;
        btnStop.disabled  = true;
        hint.style.display = '';
      }
    }

    // ─── Start / Stop ──────────────────────────────────────────
    btnStart.addEventListener('click', async () => {
      btnStart.disabled = true;
      btnStart.textContent = '…';
      const result = await api('start', {
        botId: botIdN,
        mode: selMode.value,
        website: selSite.value,
      });
      if (result?.pid) {
        setBotRunning(true, selMode.value, selSite.value);
        overlayTxt.textContent = '⏳ Бот запущен, ожидание браузера…';
        overlay.className = 'show';
        // Reconnect VNC so it picks up the new display
        clearTimeout(retryTimer);
        retryTimer = setTimeout(connect, 1500);
      } else {
        btnStart.disabled = false;
        btnStart.textContent = '▶ Запустить';
        overlayTxt.textContent = '⚠️ Ошибка запуска бота';
      }
      btnStart.textContent = '▶ Запустить';
    });

    btnStop.addEventListener('click', async () => {
      btnStop.disabled = true;
      btnStop.textContent = '…';
      await api('stop', { botId: botIdN });
      setBotRunning(false);
      overlayTxt.textContent = '⬤ Бот остановлен';
      overlay.className = 'show';
      btnStop.textContent = '■ Стоп';
    });

    // ─── VNC ───────────────────────────────────────────────────
    async function startVncServer() {
      const res = await api('vncStart', { botId: botIdN });
      if (res && res.__status === 401) return 'unauth';
      if (!res || res.__status) return 'error';
      return 'ok';
    }

    async function connect() {
      if (rfb) { try { rfb.disconnect(); } catch {} rfb = null; }

      vncStatus.textContent = '⏳ Запускаю VNC…';
      vncStatus.className = 'waiting';

      const vncResult = await startVncServer();
      if (vncResult === 'unauth') {
        overlayTxt.textContent = '🔑 Нет сессии. <a href="/" target="_blank" style="color:#7af">Войди в дашборд</a>, затем закрой это окно и нажми 👁 снова.';
        hint.style.display = 'none';
        overlay.className = 'show';
        retryTimer = setTimeout(connect, 10000);
        return;
      }
      if (vncResult === 'error') {
        overlayTxt.innerHTML = '⚠️ Ошибка сервера VNC, повтор…';
        overlay.className = 'show';
        retryTimer = setTimeout(connect, 5000);
        return;
      }

      await new Promise(res => setTimeout(res, 2000));

      try {
        rfb = new RFB(wrap, wsUrl, { credentials: { password: '' } });
        rfb.scaleViewport = true;
        rfb.resizeSession = false;

        rfb.addEventListener('connect', () => {
          wasConnected = true;
          vncStatus.textContent = '● Подключено';
          vncStatus.className = 'connected';
          overlay.className = '';
          clearTimeout(retryTimer);
        });

        rfb.addEventListener('disconnect', () => {
          rfb = null;
          vncStatus.textContent = wasConnected ? '⏳ Между запросами…' : '⏳ Ожидание…';
          vncStatus.className = 'waiting';
          overlayTxt.textContent = wasConnected
            ? '⏳ Бот между запросами, скоро появится снова…'
            : '⏳ Браузер бота ещё не запущен…';
          overlay.className = 'show';
          retryTimer = setTimeout(connect, 3000);
        });
      } catch {
        vncStatus.textContent = 'Ожидание…';
        vncStatus.className = 'waiting';
        overlayTxt.textContent = '⏳ Ожидание браузера бота…';
        overlay.className = 'show';
        retryTimer = setTimeout(connect, 5000);
      }
    }

    // ─── Init ──────────────────────────────────────────────────
    checkBotStatus();
    setInterval(checkBotStatus, 5000);
    connect();
  </script>
</body>
</html>
